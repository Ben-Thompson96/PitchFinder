# PitchFinder config — edit this, no need to touch the code.

# Only keep games kicking off at these hours (24h). "After 5pm, before 8pm" =
# a 6pm or 7pm start (the 7pm game finishes at 8pm).
allowed_start_hours = [18, 19]

# One [[venues]] block per pitch. "place_id" is the internal id hireapitch uses;
# find it in a venue page's source as <input id="ID" value="...">.
[[venues]]
name = "Brixton"
place_id = 449
category = "5 a side football"

[[venues]]
name = "Stockwell"
place_id = 1403
category = "5 a side football"
